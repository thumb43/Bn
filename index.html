
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOD FREE | Elite 3D Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        ::selection { background-color: rgba(212, 175, 55, 0.3); }
        .perspective-1000 { perspective: 1000px; }
        .transform-gpu { transform-style: preserve-3d; backface-visibility: hidden; }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .zoom-in { animation: zoomIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .gold-glow { box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body class="min-h-screen relative">

    <!-- Background Glow -->
    <div class="fixed inset-0 pointer-events-none -z-10 opacity-50">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#D4AF37]/5 to-transparent"></div>
    </div>

    <!-- Header -->
    <header class="pt-20 pb-12 text-center relative z-10">
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter uppercase italic leading-none text-white drop-shadow-2xl">
            MOD <span class="text-neutral-800">FREE</span>
        </h1>
        <div class="flex items-center justify-center gap-4 mt-6">
           <div class="h-[2px] w-20 bg-gradient-to-r from-transparent to-[#D4AF37]"></div>
           <span class="text-[12px] font-black tracking-[0.8em] text-[#D4AF37] uppercase drop-shadow-[0_0_10px_rgba(212,175,55,0.5)]">Elite 3D Access</span>
           <div class="h-[2px] w-20 bg-gradient-to-l from-transparent to-[#D4AF37]"></div>
        </div>
    </header>

    <!-- Grid Container -->
    <main id="games-grid" class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-12 pb-40 relative z-20">
        <!-- Cards injected by JS -->
    </main>

    <!-- Modal System -->
    <div id="modal-container" class="fixed inset-0 bg-black/95 backdrop-blur-3xl z-[100] hidden items-center justify-center p-8">
        <div class="w-full max-w-md bg-[#0a0a0a] border border-[#D4AF37]/20 p-12 rounded-[60px] text-center shadow-2xl relative overflow-hidden">
            
            <button onclick="closeModal()" class="absolute top-6 right-6 text-neutral-800 hover:text-white transition-colors z-50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <!-- Step 1: Injecting -->
            <div id="step-injecting" class="hidden">
                <div class="w-20 h-20 border-[6px] border-[#D4AF37]/10 border-t-[#D4AF37] rounded-full animate-spin mx-auto mb-8"></div>
                <h3 class="text-3xl font-black italic uppercase text-white">Bypassing Security...</h3>
                <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden mt-6 mb-2">
                    <div id="progress-bar" class="h-full bg-[#D4AF37] shadow-[0_0_15px_#D4AF37] w-0 transition-all duration-100"></div>
                </div>
                <div id="progress-text" class="text-[#D4AF37] font-mono text-xs font-bold tracking-widest uppercase">0% Initializing</div>
            </div>

            <!-- Step 2: Verification -->
            <div id="step-verify" class="hidden">
                <div class="w-24 h-24 bg-[#D4AF37]/10 border border-[#D4AF37]/30 rounded-[40px] flex items-center justify-center mx-auto mb-8 shadow-2xl">
                    <svg class="w-10 h-10 text-[#D4AF37]" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                </div>
                <h3 class="text-4xl font-black uppercase italic mb-4 text-white">Human Check</h3>
                <p class="text-neutral-500 text-sm font-bold mb-10 leading-relaxed px-4">
                    Complete one verification task below to prove you are not a bot and unlock your premium direct link.
                </p>
                <button onclick="handleVerifyClick()" class="w-full py-6 bg-[#D4AF37] text-black text-xl font-black rounded-3xl shadow-[0_15px_30px_rgba(212,175,55,0.3)] hover:scale-105 active:scale-95 transition-all uppercase tracking-tighter cursor-pointer">
                    Verify Now
                </button>
            </div>

            <!-- Step 3: Waiting -->
            <div id="step-waiting" class="hidden">
                <div class="w-20 h-20 border-4 border-white/5 border-t-[#D4AF37] rounded-full animate-spin mx-auto mb-8"></div>
                <h3 class="text-3xl font-black uppercase italic text-white">Checking Status...</h3>
                <p class="text-[#D4AF37] text-sm font-black animate-pulse mt-4 tracking-widest">AWAITING OFFER COMPLETION</p>
            </div>

            <!-- Step 4: Success / Direct Download -->
            <div id="step-success" class="hidden">
                <div class="w-24 h-24 bg-emerald-500/20 border border-emerald-500/50 rounded-[40px] flex items-center justify-center mx-auto mb-8 shadow-[0_0_50px_rgba(16,185,129,0.2)]">
                  <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-4xl font-black uppercase italic mb-2 text-white">Success!</h3>
                <p class="text-neutral-500 text-[11px] font-black tracking-widest mb-8 uppercase">
                  READY: <span id="success-filename" class="text-[#D4AF37]"></span>
                </p>
                <!-- We use a regular link for maximum compatibility with external servers -->
                <a id="direct-download-btn" href="#" target="_blank" rel="noreferrer noopener" class="block w-full py-6 bg-emerald-500 text-black text-xl font-black rounded-3xl shadow-2xl hover:scale-105 active:scale-95 transition-all uppercase tracking-tighter text-center">
                  Start Download
                </a>
            </div>

        </div>
    </div>

    <script>
        const games = [
            {
                id: "toca",
                title: "Toca World",
                tag: "GOLD MOD",
                version: "v1.129.1",
                size: "800.74 MB",
                fileName: "toca-world-mod.apk",
                image: "https://play-lh.googleusercontent.com/2p1aEY3_lFm50nXJvZjVTZCynEpxBFMUEBGIHB0EatLYQEGw3MmrCToXNkvRAhniCENM",
                gradient: "from-[#FF1EAD]/20 via-black to-black",
                btnColor: "#3DDC84",
                features: ["All Unlocked", "No Ads", "Premium Maps"],
                cpaUrl: "https://singingfiles.com/show.php?l=0&u=2449875&id=74463",
                // Direct link to the source to avoid authorization errors
                directDownloadUrl: "https://5play.org/index.php?do=cdn&id=16023"
            },
            {
                id: "roblox",
                title: "Roblox",
                tag: "MOD MENU",
                version: "v2.716.875",
                size: "744.53 MB",
                fileName: "roblox-mod-menu.apk",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSA39UQzADbOjU0B5Jk9B9-dNnr5PQFchIqwjBR5Kce-Q&s=10",
                gradient: "from-white/10 via-black to-black",
                btnColor: "#FFFFFF",
                features: ["Unlimited Robux", "Wallhack", "Anti-Ban"],
                cpaUrl: "https://singingfiles.com/show.php?l=0&u=2449875&id=74463",
                directDownloadUrl: "https://liteapks.com/download/roblox-94/1"
            }
        ];

        let activeGame = null;
        let progressInterval = null;

        function renderGames() {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = games.map(game => `
                <div class="perspective-1000 w-full mb-10 card-wrapper">
                    <div class="card-inner relative bg-[#0a0a0a] rounded-[50px] overflow-hidden border border-white/[0.05] flex flex-col shadow-2xl hover:border-[#D4AF37]/40 transform-gpu transition-all duration-300">
                        <div class="h-[280px] w-full relative bg-gradient-to-b ${game.gradient} overflow-hidden">
                            <img src="${game.image}" class="w-full h-full object-cover opacity-80" />
                            <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent"></div>
                        </div>
                        <div class="p-10 flex flex-col flex-grow">
                            <div class="flex items-center justify-between mb-6">
                                <h2 class="text-4xl font-black tracking-tighter uppercase italic text-white">${game.title}</h2>
                                <span class="text-[10px] font-black px-4 py-1.5 rounded-full border border-[#D4AF37] text-[#D4AF37] bg-[#D4AF37]/10 uppercase tracking-widest">${game.tag}</span>
                            </div>
                            <div class="flex gap-3 mb-6 font-bold text-neutral-500 text-[10px]">
                                <span class="bg-white/5 px-2 py-0.5 rounded uppercase">${game.version}</span>
                                <span class="bg-white/5 px-2 py-0.5 rounded uppercase">${game.size}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-3 mb-8 bg-white/[0.02] p-6 rounded-3xl border border-white/[0.03]">
                                ${game.features.map(f => `<div class="flex items-center gap-2 text-[10px] font-bold text-neutral-400 uppercase">● ${f}</div>`).join('')}
                            </div>
                            <button onclick="startProcess('${game.id}')" class="w-full py-5 font-black rounded-2xl active:scale-95 transition-all uppercase tracking-tighter text-sm" style="background-color: ${game.btnColor}; color: #000;">
                                Download Mod APK
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            setup3D();
        }

        function setup3D() {
            document.querySelectorAll('.card-wrapper').forEach(wrapper => {
                const inner = wrapper.querySelector('.card-inner');
                wrapper.addEventListener('mousemove', e => {
                    const rect = wrapper.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    inner.style.transform = `rotateY(${x * 15}deg) rotateX(${y * -15}deg)`;
                });
                wrapper.addEventListener('mouseleave', () => {
                    inner.style.transform = `rotateY(0deg) rotateX(0deg)`;
                });
            });
        }

        function showStep(id) {
            ['step-injecting', 'step-verify', 'step-waiting', 'step-success'].forEach(s => document.getElementById(s).classList.add('hidden'));
            const el = document.getElementById(id);
            el.classList.remove('hidden');
            el.classList.add(id === 'step-verify' || id === 'step-success' ? 'zoom-in' : 'fade-in');
        }

        function startProcess(id) {
            activeGame = games.find(g => g.id === id);
            document.getElementById('modal-container').classList.replace('hidden', 'flex');
            showStep('step-injecting');
            
            let p = 0;
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                p++;
                document.getElementById('progress-bar').style.width = p + '%';
                document.getElementById('progress-text').innerText = p + '% COMPILING DATA';
                if(p >= 100) {
                    clearInterval(progressInterval);
                    setTimeout(() => showStep('step-verify'), 200);
                }
            }, 30);
        }

        function handleVerifyClick() {
            window.open(activeGame.cpaUrl, '_blank');
            showStep('step-waiting');
            setTimeout(() => {
                document.getElementById('success-filename').innerText = activeGame.fileName;
                document.getElementById('direct-download-btn').href = activeGame.directDownloadUrl;
                showStep('step-success');
            }, 10000);
        }

        function closeModal() {
            document.getElementById('modal-container').classList.replace('flex', 'hidden');
            clearInterval(progressInterval);
        }

        window.onload = renderGames;
    </script>
</body>
</html>
