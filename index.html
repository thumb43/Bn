<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Top-Up | Professional Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-accent: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #050505;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, #1a1a2e 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #16213e 0%, transparent 40%);
            color: #fff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #666;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Game grid - clean and premium design */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            justify-content: center;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .game-icon {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            margin-bottom: 20px;
            object-fit: cover;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        .game-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Glass modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .modal {
            background: #111;
            border: 1px solid var(--glass-border);
            width: 90%; max-width: 400px;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .step { display: none; }
        .active { display: block; }

        .input-box {
            text-align: left;
            margin-top: 25px;
        }

        .label {
            font-size: 12px;
            font-weight: 700;
            color: #555;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 5px;
        }

        .input-field {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid #222;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: #fff;
        }

        .btn {
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Loading and Verification */
        .loader {
            width: 45px; height: 45px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .offer {
            display: block; width: 100%; padding: 18px;
            background: #1a1a1a; border-radius: 15px;
            color: #fff; text-decoration: none; font-weight: 600;
            margin-bottom: 12px; border: 1px solid #222;
            transition: 0.2s;
        }

        .offer:hover { background: #222; border-color: #444; }

    </style>
</head>
<body>

    <header class="container">
        <div class="logo">Elite Recharge</div>
        <div class="tagline">Premium Gaming Solutions</div>
    </header>

    <div class="container">
        <div class="game-grid" id="gameGrid">
            </div>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            
            <div id="step1" class="step active">
                <h2 id="m-game" style="font-size: 24px; font-weight: 800;">Game</h2>
                <div class="input-box">
                    <label class="label" id="m-label">Account ID</label>
                    <input type="text" class="input-field" id="user-id" placeholder="Enter here...">
                    
                    <label class="label">Amount</label>
                    <select class="input-field" id="amounts"></select>
                </div>
                <button class="btn" onclick="toStep2()">Continue</button>
            </div>

            <div id="step2" class="step">
                <div class="loader"></div>
                <h3 style="font-weight: 700;">Connecting...</h3>
                <p style="color: #555; font-size: 14px; margin-top: 10px;">Establishing a secure connection to game servers.</p>
            </div>

            <div id="step3" class="step">
                <h2 style="font-weight: 800; font-size: 22px;">Human Verification</h2>
                <p style="color: #777; font-size: 14px; margin: 15px 0 25px;">Final step! Complete one of the offers below to send resources to the account <span id="v-id" style="color:#fff;"></span>.</p>
                <div id="offers"></div>
            </div>

            <div id="step4" class="step">
                <div style="font-size: 50px; margin-bottom: 15px;">✓</div>
                <h2 style="font-weight: 800;">Request Sent</h2>
                <p style="color: #666; font-size: 14px; margin-top: 10px;">Please wait 5 to 10 minutes for the process to complete.</p>
                <button class="btn" style="margin-top: 25px; background: #1a1a1a; color: #fff;" onclick="location.reload()">Finish</button>
            </div>

        </div>
    </div>

    <script>
        // Final list after removing requested games
        const games = [
            { name: 'Roblox', label: 'Username', img: 'https://img.icons8.com/color/512/roblox.png', am: ['800 Robux', '1,700 Robux', '4,500 Robux'], link: 'https://singingfiles.com/show.php?l=0&u=2449875&id=74581' },
            { name: 'Fortnite', label: 'Epic Games Email', img: 'https://img.icons8.com/color/512/fortnite.png', am: ['2,800 V-Bucks', '5,000 V-Bucks', '13,500 V-Bucks'], link: 'https://singingfiles.com/show.php?l=0&u=2449875&id=74581' },
            { name: 'Free Fire', label: 'Player UID', img: 'https://img.icons8.com/color/512/free-fire.png', am: ['1,060 Diamonds', '2,180 Diamonds', '5,600 Diamonds'], link: 'https://singingfiles.com/show.php?l=0&u=2449875&id=74581' },
            { name: 'Valorant', label: 'Riot ID', img: 'https://img.icons8.com/color/512/valorant.png', am: ['2,050 VP', '5,350 VP', '11,000 VP'], link: 'https://singingfiles.com/show.php?l=0&u=2449875&id=74581' },
            { name: 'NBA 2K25', label: 'PSN/Xbox ID', img: 'https://img.icons8.com/color/512/basketball.png', am: ['75,000 VC', '200,000 VC', '450,000 VC'], link: 'https://singingfiles.com/show.php?l=0&u=2449875&id=74581' },
            { name: 'Call of Duty', label: 'Activision ID', img: 'https://img.icons8.com/color/512/call-of-duty-warzone.png', am: ['2,400 CP', '5,000 CP', '9,500 CP'], link: 'https://singingfiles.com/show.php?l=0&u=2449875&id=74581' }
        ];

        const grid = document.getElementById('gameGrid');
        let current = null;

        games.forEach(g => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `<img src="${g.img}" class="game-icon"><div class="game-name">${g.name}</div>`;
            card.onclick = () => {
                current = g;
                document.getElementById('m-game').innerText = g.name;
                document.getElementById('m-label').innerText = g.label;
                const sel = document.getElementById('amounts');
                sel.innerHTML = '';
                g.am.forEach(a => sel.innerHTML += `<option>${a}</option>`);
                document.getElementById('overlay').style.display = 'flex';
                switchStep(1);
            };
            grid.appendChild(card);
        });

        function switchStep(n) {
            document.querySelectorAll('.step').forEach((s, idx) => s.classList.toggle('active', (idx+1) === n));
        }

        function toStep2() {
            const id = document.getElementById('user-id').value;
            if(!id) return;
            document.getElementById('v-id').innerText = id;
            switchStep(2);
            setTimeout(() => {
                switchStep(3);
                document.getElementById('offers').innerHTML = `
                    <a href="${current.link}" target="_blank" class="offer" onclick="finish()">Verify Now</a>
                    <a href="${current.link}" target="_blank" class="offer" onclick="finish()">Confirm Order</a>
                `;
            }, 3000);
        }

        function finish() { setTimeout(() => switchStep(4), 2000); }

        document.getElementById('overlay').onclick = (e) => {
            if(e.target.id === 'overlay') document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
